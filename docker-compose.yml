services:
  imparatorluk-test:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
    image: imparatorluk-test:latest
    container_name: imparatorluk-test
    restart: always
    ports:
      - "127.0.0.1:8090:80"
    environment:
      - GAME_ENV=prod
      - DOMAIN=${DOMAIN}
      - NUM_WORKERS=${NUM_WORKERS:-2}
      - GIT_COMMIT=${GIT_COMMIT:-dev}
      - API_KEY=${API_KEY}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
    volumes:
      # Veritabani ve JWT anahtarlarini kalici yap
      - api_data:/usr/src/app/api-backend
      # Nginx log
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  api_data:
    driver: local
  nginx_logs:
    driver: local
