services:
  imparatorluk-test:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
    image: imparatorluk-test:latest
    container_name: imparatorluk-test
    restart: always
    environment:
      - GAME_ENV=prod
      - DOMAIN=fetih.xyz
      - NUM_WORKERS=2
      - API_KEY=WARNING_DEV_API_KEY_DO_NOT_USE_IN_PRODUCTION
      - TURNSTILE_SITE_KEY=1x00000000000000000000AA
      - ADMIN_TOKEN=WARNING_DEV_ADMIN_TOKEN_DO_NOT_USE
      - GIT_COMMIT=dev
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.imparatorluk-test.rule=Host(`fetih.xyz`)"
      - "traefik.http.routers.imparatorluk-test.entrypoints=websecure"
      - "traefik.http.routers.imparatorluk-test.tls=true"
      - "traefik.http.services.imparatorluk-test.loadbalancer.server.port=80"
    volumes:
      - api_data:/usr/src/app/api-backend
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  web:
    external: true

volumes:
  api_data:
    driver: local
  nginx_logs:
    driver: local
