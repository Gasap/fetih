# WebSocket settings
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name imparatorluk.online www.imparatorluk.online;
    
    if ($host = www.imparatorluk.online) {
        return 301 https://$host$request_uri;
    }
    if ($host = imparatorluk.online) {
        return 301 https://$host$request_uri;
    }
    return 404;
}

server {
    listen 443 ssl;
    server_name imparatorluk.online www.imparatorluk.online;

    ssl_certificate /etc/letsencrypt/live/imparatorluk.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imparatorluk.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Custom Auth API backend (JWT, login, admin)
    location ^~ /api-backend/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 32k;
        proxy_buffers 4 32k;
    }

    # Admin panel
    location ^~ /admin {
        proxy_pass http://127.0.0.1:4000/admin;
        proxy_http_version 1.1;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 32k;
        proxy_buffers 4 32k;
    }

    # Worker locations - Game Servers & WebSockets
    location ~* ^/w(\d+)(/.*)?$ {
        set $worker $1;
        set $worker_port 3001;
        
        if ($worker = "0") { set $worker_port 3001; }
        if ($worker = "1") { set $worker_port 3002; }
        if ($worker = "2") { set $worker_port 3003; }
        if ($worker = "3") { set $worker_port 3004; }
        if ($worker = "4") { set $worker_port 3005; }
        if ($worker = "5") { set $worker_port 3006; }
        if ($worker = "6") { set $worker_port 3007; }
        if ($worker = "7") { set $worker_port 3008; }
        if ($worker = "8") { set $worker_port 3009; }
        if ($worker = "9") { set $worker_port 3010; }
        
        proxy_pass http://127.0.0.1:$worker_port$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main frontend and game server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
